name: Validate and Deploy Cloudflare Full Stack

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend-next/package-lock.json

      - name: Install Worker dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend-next

      - name: Type-check Cloudflare Worker
        run: npm run check

      - name: Build static frontend
        run: npm run build

      - name: Apply D1 migrations
        if: github.event_name == 'workflow_dispatch'
        run: npx wrangler d1 migrations apply DB --remote

      - name: Deploy Worker, API and static assets
        if: github.event_name == 'workflow_dispatch'
        run: npx wrangler deploy